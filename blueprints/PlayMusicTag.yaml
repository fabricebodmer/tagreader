blueprint:
  name: Play Music Tag
  description: Play music tag NDEF url
  domain: automation
  input:
    reader_id:
      name: ESPHome NFC reader device
      description: This is your NFC reader
      selector:
        device:
          integration: esphome
    player:
      name: Media Player
      description: This is your media player for this reader
      selector:
        entity:
          domain: media_player

variables:
  device_id: !input reader_id
  reader: '{{ device_attr(device_id, "name") }}'

trigger:
  - platform: event
    event_type: esphome.music_tag
condition:
  - condition: template
    value_template: "{{ (trigger.event.data.reader|upper) == (reader|upper) }}"
action:
  - service: media_player.media_stop
    target:
      entity_id: !input player
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.source == \"sonos\" }}"
        sequence:
          - service: media_player.select_source
            data:
              source: "{{ trigger.event.data.info }}"
            target:
              entity_id: !input player
      - conditions:
          - condition: template
            value_template: "{{ trigger.event.data.source == \"m3u\" }}"
        sequence:
          - service: media_player.play_media
            data:
              media_content_type: music
              media_content_id: "x-rincon-mp3radio://{{ trigger.event.data.url }}"
            target:
              entity_id: !input player
    default:
      - variables:
          ma_media_id: >-
            {% set uri = trigger.event.data.url %}
            {% if uri.startswith('https://music.apple.com/') %}
              {% set parts = uri.split('?')[0].split('/') %}
              {% set type_map = {'album': 'album', 'song': 'track', 'playlist': 'playlist', 'artist': 'artist'} %}
              {% set apple_type = parts[4] %}
              {% set query = uri.split('?')[1] if '?' in uri else '' %}
              {% set track_id = namespace(value='') %}
              {% for param in query.split('&') %}
                {% if param.startswith('i=') %}
                  {% set track_id.value = param[2:] %}
                {% endif %}
              {% endfor %}
              {% if apple_type == 'album' and track_id.value %}
                {{ 'apple_music://track/' ~ track_id.value }}
              {% else %}
                {{ 'apple_music://' ~ type_map.get(apple_type, 'album') ~ '/' ~ parts[-1] }}
              {% endif %}
            {% else %}
              {{ uri | regex_replace('\?.*$', '') }}
            {% endif %}
          ma_media_type: >-
            {% set uri = trigger.event.data.url %}
            {% if uri.startswith('https://music.apple.com/') %}
              {% set parts = uri.split('?')[0].split('/') %}
              {% set apple_type = parts[4] %}
              {% set query = uri.split('?')[1] if '?' in uri else '' %}
              {% set track_id = namespace(value='') %}
              {% for param in query.split('&') %}
                {% if param.startswith('i=') %}
                  {% set track_id.value = param[2:] %}
                {% endif %}
              {% endfor %}
              {% if apple_type == 'album' and track_id.value %}track
              {% elif apple_type == 'song' %}track
              {% elif apple_type == 'playlist' %}playlist
              {% elif apple_type == 'artist' %}artist
              {% else %}album
              {% endif %}
            {% else %}album
            {% endif %}
      - service: music_assistant.play_media
        data:
          media_id: "{{ ma_media_id }}"
          media_type: "{{ ma_media_type }}"
          enqueue: replace
        target:
          entity_id: !input player
mode: queued
max: 10